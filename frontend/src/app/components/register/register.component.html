<div class="min-h-screen flex items-center justify-content-center bg-gray-100">
  <div class="w-full max-w-md">
    <p-card styleClass="shadow-lg">
      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <img src="https://storage.googleapis.com/hust-files/images/logo_telsoft(1)_15.9k.png" alt="Logo" class="w-24 h-24 object-contain">
      </div>

      <!-- Title -->
      <div class="text-center mb-6">
        <h2 class="text-3xl font-bold text-gray-800 mb-2">Đăng ký</h2>
        <p class="text-gray-500">Tạo tài khoản mới</p>
      </div>

      <!-- Form -->
      <div class="flex flex-col gap-5">
        <!-- Username -->
        <div class="flex flex-col gap-2">
          <label for="username" class="font-medium text-gray-700">Tên đăng nhập</label>
          <p-iconfield>
            <p-inputicon styleClass="pi pi-user" />
            <input 
              pInputText 
              id="username"
              [(ngModel)]="username" 
              placeholder="Nhập tên đăng nhập"
              [disabled]="isLoading"
              class="w-full pl-10"
            >
          </p-iconfield>
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-2">
          <label for="password" class="font-medium text-gray-700">Mật khẩu</label>
          <div class="password-with-icon">
            <i class="pi pi-lock password-icon"></i>
            <p-password 
              id="password"
              [(ngModel)]="password" 
              placeholder="Nhập mật khẩu"
              [disabled]="isLoading"
              [toggleMask]="true"
              [feedback]="false"
              styleClass="w-full"
              inputStyleClass="w-full"
            ></p-password>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="flex flex-col gap-2">
          <label for="confirmPassword" class="font-medium text-gray-700">Xác nhận mật khẩu</label>
          <div class="password-with-icon">
            <i class="pi pi-lock password-icon"></i>
            <p-password 
              id="confirmPassword"
              [(ngModel)]="confirmPassword" 
              placeholder="Nhập lại mật khẩu"
              [disabled]="isLoading"
              [toggleMask]="true"
              [feedback]="false"
              styleClass="w-full"
              inputStyleClass="w-full"
            ></p-password>
          </div>
        </div>

        <!-- Role Dropdown -->
        <div class="flex flex-col gap-2">
          <label for="role" class="font-medium text-gray-700">Vai trò</label>
          <p-select
            id="role"
            [(ngModel)]="selectedRole"
            [options]="roleOptions"
            optionLabel="label"
            placeholder="Chọn vai trò"
            [disabled]="isLoading"
            styleClass="w-full"
          ></p-select>
        </div>

        <!-- Error Message -->
        <p-message 
          *ngIf="errorMessage" 
          severity="error" 
          [text]="errorMessage"
          styleClass="w-full"
        ></p-message>

        <!-- Success Message -->
        <p-message 
          *ngIf="successMessage" 
          severity="success" 
          [text]="successMessage"
          styleClass="w-full"
        ></p-message>

        <!-- Submit Button -->
        <p-button 
          [label]="isLoading ? 'Đang xử lý...' : 'Đăng ký'" 
          icon="pi pi-user-plus"
          [loading]="isLoading"
          (onClick)="onRegister()"
          styleClass="w-full"
          severity="primary"
        ></p-button>

        <p-divider></p-divider>

        <!-- Login Link -->
        <div class="text-center">
          <span class="text-gray-600">Đã có tài khoản? </span>
          <a routerLink="/login" class="text-blue-500 font-semibold hover:text-blue-700 no-underline">
            Đăng nhập
          </a>
        </div>
      </div>
    </p-card>
  </div>
</div>
